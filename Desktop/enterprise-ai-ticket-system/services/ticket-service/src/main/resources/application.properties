spring.application.name=ticket-service
server.port=8082

# AI service config
ai.baseUrl=${AI_BASE_URL:http://localhost:8000}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

info.app.name=${spring.application.name}
info.app.description=Enterprise AI Ticket System - Ticket Service
info.app.version=0.2.0-FAZ1

# ── Faz 1: PostgreSQL ──────────────────────────────────────────────────────────
# ${ENV_VAR:default} → ortam değişkeni yoksa default kullanılır (local geliştirme)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tickets}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tickets}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tickets}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# ddl-auto=validate → Hibernate şema oluşturmaz; Flyway'e bırakır; uyumsuzlukta hata verir
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
# locations → migration SQL dosyalarının yeri
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Resilience4j — AI client
resilience4j.circuitbreaker.instances.ai-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.ai-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ai-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.ai-service.max-attempts=3
resilience4j.retry.instances.ai-service.wait-duration=500ms
resilience4j.retry.instances.ai-service.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.net.SocketTimeoutException

resilience4j.timelimiter.instances.ai-service.timeout-duration=5s

# Logging
logging.level.com.company.ticketservice=DEBUG
logging.level.org.springframework.web=INFO