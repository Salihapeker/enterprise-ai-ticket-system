services:
  ai-service:
    build:
      context: ./services/ai-analysis-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  ticket-service:
    build:
      context: ./services/ticket-service
      dockerfile: Dockerfile
    container_name: ticket-service
    ports:
      - "8082:8082"
    environment:
      - AI_BASE_URL=http://ai-service:8000
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

